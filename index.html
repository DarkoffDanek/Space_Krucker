<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sky Rogue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <div class="shop">
        <h2>МАГАЗИН</h2>

        <div class="upgrade" data-type="damage">
            <span>Урон</span>
            <div class="levels"></div>
            <button>Купить</button>
        </div>

        <div class="upgrade" data-type="speed">
            <span>Скорость</span>
            <div class="levels"></div>
            <button>Купить</button>
        </div>

        <div class="upgrade" data-type="ammo">
            <span>Скорострельность</span>
            <div class="levels"></div>
            <button>Купить</button>
        </div>

        <div class="stats">
            <p>HP: <span id="hp">100</span></p>
            <p>Coins: <span id="coins">0</span></p>
        </div>
    </div>

    <div class="game">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOver" class="hidden">
            <h1>GAME OVER</h1>
            <button onclick="location.reload()">Заново</button>
        </div>
    </div>

</div>

<script src="game.js" defer></script>
</body>
</html>
