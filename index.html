<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Sky Roguelike</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui">
  <div class="panel stats">
    <h2>Пилот</h2>
    <div>❤️ HP: <span id="hp">100</span></div>
    <div>💰 Coins: <span id="coins">0</span></div>
    <div>🔫 Ammo: <span id="ammo">50</span></div>
  </div>

  <div class="panel shop">
    <h2>Улучшения</h2>
    <button onclick="buy('damage')">⚡ Урон (+1) - 10</button>
    <button onclick="buy('speed')">🚀 Скорость (+1) - 10</button>
    <button onclick="buy('ammo')">📦 Патроны (+20) - 5</button>
  </div>
</div>

<canvas id="game"></canvas>

<script src="game.js"></script>
</body>
</html>
