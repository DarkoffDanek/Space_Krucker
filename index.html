<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Sky Roguelike</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui">
    <div id="stats">HP: <span id="hp">100</span> | Coins: <span id="coins">0</span> | Ammo: <span id="ammo">50</span></div>
    <div id="shop">
      <h3>Улучшения</h3>
      <button onclick="buy('damage')">Урон (10)</button>
      <button onclick="buy('speed')">Скорость (10)</button>
      <button onclick="buy('ammo')">Патроны (5)</button>
    </div>
  </div>
  <canvas id="game"></canvas>
  <script src="game.js"></script>
</body>
</html>
