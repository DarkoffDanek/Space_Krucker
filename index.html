<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Sky Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">
  
  <div id="ui">
    <h2>Пилот</h2>
    <div>❤️ HP: <span id="hp">100</span></div>
    <div>💰 Coins: <span id="coins">0</span></div>
    <div>🔫 Ammo: <span id="ammo">50</span></div>

    <h3>Магазин</h3>

    <div class="shop-item">
      <button onclick="buy('damage')">Урон</button>
      <div class="bars" id="damageBar"></div>
    </div>

    <div class="shop-item">
      <button onclick="buy('speed')">Скорость</button>
      <div class="bars" id="speedBar"></div>
    </div>

    <div class="shop-item">
      <button onclick="buy('ammo')">Патроны</button>
      <div class="bars" id="ammoBar"></div>
    </div>
  </div>

  <canvas id="game"></canvas>

</div>

<script src="game.js" defer></script>
</body>
</html>
